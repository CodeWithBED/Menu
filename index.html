/* Parse ingredient amount from menu data */
function parseIngAmt(c,u){
  const s=c.toString().trim();
  if(s.includes('/')){const p=s.split('/');return {q:parseFloat(p[0])/parseFloat(p[1]),u:u||''};}
  if(/^\d+g$/.test(s)){return {q:parseFloat(s),u:'g'};}
  if(/^\d+\s*(cda|cdta|taza|pizca)/.test(s)){return {q:0,u:''};}
  return {q:parseFloat(s)||0,u:u||''};
}

/* Normalize ingredient names (aliases in menu тЖТ canonical name) */
const ING_ALIAS={'Pollo (muslo/pechuga)':'Pechuga de pollo','Brocoli':'Brocoli','Atun en lata':'Atun en lata'};

/* Calculate weekly ingredient needs from the actual menu */
function getMenuNeeds(){
  const needs={};
  const menu=MENUS[S.week];
  menu.forEach(day=>{
    day.comidas.forEach(meal=>{
      meal.ing.forEach(ing=>{
        const name=ING_ALIAS[ing.n]||ing.n;
        const parsed=parseIngAmt(ing.c,ing.u);
        if(parsed.q===0)return;
        if(!needs[name]){needs[name]={q:0,u:parsed.u};}
        // Only aggregate if same unit
        if(needs[name].u===parsed.u||needs[name].q===0){
          needs[name].q+=parsed.q;
          if(needs[name].u==='')needs[name].u=parsed.u;
        }
      });
    });
  });
  // Post-process: round and convert units
  Object.keys(needs).forEach(n=>{
    const item=needs[n];
    if(item.u==='lbs'){item.q=Math.round(item.q*10)/10;}
    else if(item.u==='unidad'||item.u==='unidades'){item.q=Math.ceil(item.q);}
    else if(item.u==='g'){item.q=Math.ceil(item.q/50)*50;}
    else if(item.u==='dientes'){item.q=Math.ceil(item.q/10);item.u='cabeza(s)';}
  });
  return needs;
}

function calcQty(item){
  const weeks=S.freq==='quincenal'?2:1;
  const menuNeeds=getMenuNeeds();
  const mn=menuNeeds[item.n];
  if(mn&&mn.q>0){
    const total=mn.u==='g'?Math.ceil(mn.q*S.persons*weeks)+' g':Math.round(mn.q*S.persons*weeks*10)/10+' '+mn.u;
    return {val:total,su:false};
  }
  if(item.q===0)return {val:'segun uso',su:true};
  const total=Math.round(item.q*S.persons*weeks*10)/10;
  return {val:total+' '+item.u,su:false};
}

}

function personsBar(){
  return '<div class="persons-bar"><div class="persons-lbl">Personas</div><button class="persons-btn" onclick="pp(-1)">тИТ</button><div class="persons-val">'+S.persons+'</div><button class="persons-btn" onclick="pp(1)">+</button></div>';
}

function recipeCard(r){
  const isFull=r.missing.length===0;
  let h='<div class="recipe-card '+(isFull?'full':'partial')+'"><div class="recipe-badge '+(isFull?'badge-full':'badge-partial')+'">'+(isFull?'Completo':'Casi')+'</div>';
  h+='<div class="recipe-name">'+r.emoji+' '+r.name+'</div><div class="recipe-cat">'+r.cat+'</div>';
  h+='<div class="r-macros"><div class="r-mac"><div class="r-mac-val">'+(r.p*S.persons)+'g</div><div class="r-mac-lbl">proteina</div></div><div class="r-mac"><div class="r-mac-val">'+(r.c*S.persons)+'g</div><div class="r-mac-lbl">carbs</div></div><div class="r-mac"><div class="r-mac-val">'+S.persons+'</div><div class="r-mac-lbl">'+(S.persons===1?'persona':'personas')+'</div></div></div>';
  const availIng=r.ing.filter(i=>S.avail.has(i.n));
  const missingIng=r.ing.filter(i=>!S.avail.has(i.n)).map(i=>i.n);
  h+=availIng.map(i=>'<div class="r-ing-row"><div class="r-ing-name">'+i.n+'</div><div class="r-ing-amt">'+(Math.round(i.a*S.persons*10)/10)+' '+i.u+'</div></div>').join('');
  if(missingIng.length){h+='<div class="recipe-missing">Opcional no disponible: '+missingIng.join(', ')+'</div>';}
  h+='<button class="recipe-wha" onclick="whaRecipe(\''+r.name.replace(/'/g,"\\'")+'\')" >'+whaIcon('#4a8a5a')+' Compartir receta</button></div>';
  return h;
}

function matchRecipes(){
  return RECIPES.map(r=>{
    // Only show if all REQUIRED ingredients are available
    const reqMissing=r.req.filter(i=>!S.avail.has(i));
    if(reqMissing.length>0)return null;
    // Missing = ALL ing items not available (including optional)
    const ingMissing=r.ing.filter(i=>!S.avail.has(i.n)).map(i=>i.n);
    return Object.assign({},r,{missing:ingMissing});
  }).filter(r=>r!==null&&r.missing.length<=3)
    .sort((a,b)=>a.missing.length-b.missing.length);
}

/* ===== INGREDIENTES ===== */
function vIng(){
  const d=MENUS[S.week][S.day];
  let h='<div class="v-hdr"><div class="v-title">'+DAYS_FULL[S.day]+'</div><div class="v-sub">Ingredientes del dia ┬╖ 3 comidas</div></div>';
  d.comidas.forEach(c=>{
    h+='<div class="ing-card"><div class="ing-meal-hdr">'+c.icono+' '+c.nombre+'</div>';
    c.ing.forEach(ing=>{
      const cr=ing.sub&&S.unavail.has(ing.sub);
      h+='<div class="ing-row"><div><div class="ing-name'+(cr?' crossed':'')+'">'+ing.n+'</div>'+(cr?'<div style="font-size:10px;color:#5a3a10;font-family:sans-serif">Ver sustituto en Menu</div>':'')+'</div><div><div class="ing-amt">'+ing.c+'</div>'+(ing.u?'<div class="ing-unit">'+ing.u+'</div>':'')+'</div></div>';
    });
    h+='</div>';
  });
  h+='<div style="display:flex;gap:8px;margin-top:16px">';
  h+='<button class="wha-btn" style="flex:1;margin-top:0" onclick="whaMenu()">'+whaIcon('#4a8a5a')+' WhatsApp</button>';
  h+='<button class="wha-btn" style="flex:1;margin-top:0;background:#0a0a14;border-color:#1e2e4a;color:#4a6a9a" onclick="whaEmail()">тЬЙ Email</button>';
  h+='</div>';
  return h;
}

/* ===== COMPRAS ===== */
function vCompras(){
  const totalAvail=S.cats.reduce((s,c)=>s+c.items.length,0);
  let h='<div class="v-hdr"><div class="v-title">Lista de Compras</div><div class="v-sub">Ingredientes no disponibles</div></div>';
  h+=personsBar();
  h+='<div class="freq-toggle"><button class="freq-btn '+(S.freq==='semanal'?'active':'')+'" onclick="sf(\'semanal\')">Semanal</button><button class="freq-btn '+(S.freq==='quincenal'?'active':'')+'" onclick="sf(\'quincenal\')">Quincenal</button></div>';
  if(S.avail.size===0){
    h+='<div class="empty-shop">Ve a <strong style="color:#c8a96e">ЁЯФН Sugerir</strong> y marca<br>los ingredientes que ya tenes en casa.<br><br>Los que no esten marcados apareceran<br>aqui como lista de compras.</div>';
    return h;
  }
  let hasItems=false;
  S.cats.forEach(cat=>{
    const need=cat.items.filter(item=>!S.avail.has(item.n));
    if(!need.length)return;
    hasItems=true;
    h+='<div class="shop-card"><div class="shop-cat">'+cat.emoji+' '+cat.label+'</div>';
    need.forEach(item=>{
      const k='sh_'+item.n;
      const chk=S.checked.has(k);
      const qty=calcQty(item);
      h+='<div class="shop-row '+(chk?'chk':'')+'" onclick="tc(\''+k+'\')"><div class="chk-box '+(chk?'done':'')+'">'+( chk?'тЬУ':'')+'</div><div class="shop-name">'+item.n+'</div><div class="shop-qty'+(qty.su?' su':'')+'">'+qty.val+'</div></div>';
    });
    h+='</div>';
  });
  if(!hasItems){h+='<div class="empty-shop">ЁЯОЙ Todo disponible<br>No tenes nada que comprar.</div>';}
  return h;
}

/* ===== ACTIONS ===== */
function sw(){S.week=S.week==='week1'?'week2':'week1';render();}
function sv(v){S.view=v;render();}
function sd(d){S.day=d;render();}
function tu(k){S.unavail.has(k)?S.unavail.delete(k):S.unavail.add(k);render();}
function sf(f){S.freq=f;render();}
function tc(k){S.checked.has(k)?S.checked.delete(k):S.checked.add(k);render();}
function pp(n){S.persons=Math.max(1,Math.min(10,S.persons+n));render();}
function togIng(i){S.avail.has(i)?S.avail.delete(i):S.avail.add(i);render();}
function selAll(key){
  const cat=S.cats.find(c=>c.key===key);
  if(!cat)return;
  const allOn=cat.items.every(i=>S.avail.has(i.n));
  cat.items.forEach(i=>allOn?S.avail.delete(i.n):S.avail.add(i.n));
  render();
}
function toggleEdit(){S.editMode=!S.editMode;render();}
function delIng(catKey,itemName){
  const cat=S.cats.find(c=>c.key===catKey);
  if(cat){cat.items=cat.items.filter(i=>i.n!==itemName);S.avail.delete(itemName);}
  render();
}
function addIng(){
  const input=document.getElementById('newIngInput');
  const sel=document.getElementById('newCatSel');
  const val=input?input.value.trim():'';
  const catKey=sel?sel.value:S.newCat;
  if(!val)return;
  const cat=S.cats.find(c=>c.key===catKey);
  if(cat&&!cat.items.find(i=>i.n===val)){cat.items.push({n:val,q:0,u:'segun uso'});}
  render();
}

/* ===== SHARE ===== */
function whaMenu(){
  const d=MENUS[S.week][S.day];
  const tp=d.comidas.reduce((s,c)=>s+c.p,0);
  let msg='ЁЯеЧ *Menu Nodulis ┬╖ '+DAYS_FULL[S.day]+'*\n_Proteina total: ~'+tp+'g_\n\n';
  d.comidas.forEach(c=>{msg+='*'+c.icono+' '+c.nombre+'*\n';c.desc.forEach(x=>{msg+='тАв '+x+'\n';});msg+='\n';});
  msg+='ЁЯУ▒ App: '+APP_URL;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function whaRecipe(name){
  const r=RECIPES.find(x=>x.name===name);
  if(!r)return;
  let msg='ЁЯН╜ *'+r.name+'*'+(S.persons>1?' ('+S.persons+' personas)':'')+'\nProteina: '+(r.p*S.persons)+'g | Carbs: '+(r.c*S.persons)+'g\n\n*Ingredientes:*\n';
  r.ing.forEach(i=>{msg+='тАв '+i.n+': '+(Math.round(i.a*S.persons*10)/10)+' '+i.u+'\n';});
  msg+='\nЁЯУ▒ App: '+APP_URL;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}
function whaEmail(){
  const d=MENUS[S.week][S.day];
  const tp=d.comidas.reduce((s,c)=>s+c.p,0);
  let body='Menu Nodulis - '+DAYS_FULL[S.day]+'\nProteina total: ~'+tp+'g\n\n';
  d.comidas.forEach(c=>{body+=c.nombre+'\n';c.desc.forEach(x=>{body+='- '+x+'\n';});body+='\n';});
  body+='App: '+APP_URL;
  window.location.href='mailto:?subject=Menu Nodulis - '+DAYS_FULL[S.day]+'&body='+encodeURIComponent(body);
}

S.day=today();
render();
</script>
